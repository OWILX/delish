<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delish Dispatch• Food at your door step</title>
    
    <!-- Brand Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <style>
        /* Extra hero-specific styles (keeps main CSS clean) */
        .hero {
            background: linear-gradient(rgba(44, 44, 44, 0.75), rgba(44, 44, 44, 0.75)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .hero-content {
            max-width: 620px;
        }
        
        .food-badge {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
<nav class="navbar">
  <div class="container">

    <!-- Logo (placeholder) -->
    <a href="#" onclick="navigateTo('home')" class="logo">
      🍲 Delish
      <!-- NOTE: Replace the emoji + text with real logo later -->
      <!-- Example: <img src="assets/images/logo.png" alt="Delish" height="42"> -->
    </a>

    <!-- Desktop Navigation -->
    <div class="desktop-nav">
      <a href="#" onclick="navigateTo('home')" class="nav-link">Home</a>
      <a href="#" onclick="navigateTo('restaurants')" class="nav-link">Restaurants</a>
      <a href="#" onclick="navigateTo('orders')" class="nav-link">Track Order</a>
      <a href="#" onclick="navigateTo('support')" class="nav-link">Support</a>
    </div>

    <!-- Right side actions -->
    <div class="navbar-actions">

      <!-- Location -->
      <div class="location-badge">
        📍 Abuja, FCT
        <span onclick="changeLocation()">Change</span>
      </div>

      <!-- Cart -->
      <button onclick="showCart()" class="cart-button">
        🛒
        <span id="cart-count" class="cart-count">3</span>
      </button>

      <!-- Account / Role Switcher (demo) -->
      <div class="relative">
        <button onclick="toggleAccountMenu()" class="account-button">
          👤 Customer
          <span class="text-xs">▼</span>
        </button>

        <!-- Dropdown -->
        <div id="account-menu" class="hidden absolute right-0 mt-3 w-64 bg-soft-cream text-deep-charcoal shadow-xl rounded-3xl py-3 border border-muted-sage z-50">
          <a onclick="switchRole('customer')" class="flex px-6 py-3 hover:bg-warm-amber hover:text-deep-charcoal items-center gap-3">👤 Customer Mode</a>
          <a onclick="switchRole('seller')" class="flex px-6 py-3 hover:bg-warm-amber hover:text-deep-charcoal items-center gap-3">👨‍🍳 Restaurant Owner</a>
          <a onclick="switchRole('moderator')" class="flex px-6 py-3 hover:bg-warm-amber hover:text-deep-charcoal items-center gap-3">🛡️ Moderator</a>
        </div>
      </div>

      <!-- Mobile Hamburger -->
      <button onclick="toggleMobileMenu()" class="mobile-hamburger">
        ☰
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="mobile-menu">
    <a href="#" onclick="navigateTo('home');toggleMobileMenu()" class="nav-link">Home</a>
    <a href="#" onclick="navigateTo('restaurants');toggleMobileMenu()" class="nav-link">Restaurants</a>
    <a href="#" onclick="navigateTo('orders');toggleMobileMenu()" class="nav-link">Track Order</a>
    <a href="#" onclick="navigateTo('support');toggleMobileMenu()" class="nav-link">Support</a>
  </div>
</nav>

    <script>
  // Mobile menu
  function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.toggle('active');
  }

  // Account dropdown
  function toggleAccountMenu() {
    const menu = document.getElementById('account-menu');
    menu.classList.toggle('hidden');
  }

  function switchRole(role) {
    document.getElementById('account-menu').classList.add('hidden');
    alert(`✅ Switched to ${role.toUpperCase()} dashboard (demo mode)\n\nNext: we’ll load the real seller/moderator view.`);
    // Future: window.location = `/seller.html` etc.
  }

  // Placeholder navigation (will become real SPA router later)
  function navigateTo(page) {
    console.log(`Navigating to ${page} section...`);
    // For now it logs – we’ll make it scroll to sections or load pages
    if (page === 'home') window.scrollTo({ top: 0, behavior: 'smooth' });
    // Add more later
  }

  function changeLocation() {
    const newLoc = prompt("Enter new location (demo):", "Abuja, FCT");
    if (newLoc) alert(`📍 Location changed to ${newLoc}`);
  }

  function showCart() {
    alert("🛒 Cart opened (we’ll build the full sidebar next)");
  }
</script>
</body>
</html>
